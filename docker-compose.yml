version: "3.8"
services:
  db:
    image: postgres:15
    container_name: cm_postgres
    environment:
      POSTGRES_DB: cmdb
      POSTGRES_USER: cmuser
      POSTGRES_PASSWORD: cmpass
    volumes:
      - cm_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - db
    restart: unless-stopped
  backend:
    build: .
    container_name: cm_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://cmuser:cmpass@db:5432/cmdb
    ports:
      - "8082:8000"
    depends_on:
      - db
    restart: unless-stopped
volumes:
  cm_pgdata:
